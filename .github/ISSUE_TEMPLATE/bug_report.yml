name: Bug Report
description: Report a bug in NeuralMesh
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of NeuralMesh are you using?
      placeholder: "v0.1.0"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Node daemon
        - P2P networking
        - Task scheduler
        - Docker sandbox
        - AI inference (ONNX)
        - Reward system
        - CLI
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ...
        2. Execute ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS: Ubuntu 24.04
        CPU: AMD Ryzen 7 5800X
        GPU: NVIDIA RTX 3060 12GB
        Driver: 525.x
        Docker: 26.x
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: text
