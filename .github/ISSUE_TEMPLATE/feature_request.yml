name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, check if a NIP already covers this:
        [docs/NIP-INDEX.md](../docs/NIP-INDEX.md)

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: dropdown
    id: phase
    attributes:
      label: Target phase
      options:
        - Phase 0 — Foundation
        - Phase 1 — MVP
        - Phase 2 — Community
        - Phase 3 — Economic Layer
        - Phase 4 — Decentralization
        - Not sure
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
